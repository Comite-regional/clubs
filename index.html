<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Observatoire Tir à l'Arc — PDL</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="main-container">
        <div id="map"></div>
        <div id="overlay" class="overlay"></div>
        
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>Tir à l'Arc</h1>
                <p>Pays de la Loire</p>
            </div>
            
            <div class="filters-area">
                <div class="filter-section-title">Recherche (Nom, Ville, CP)</div>
                <div class="search-wrapper">
                    <input type="text" id="search" placeholder="Ex: Nantes, Guérande...">
                    <button id="searchValidate">🔍</button>
                </div>

                <div class="filter-section-title">Mode d'analyse Carte</div>
                <div class="mode-tabs">
                    <button class="segBtn active" data-mode="licences">Effectifs</button>
                    <button class="segBtn" data-mode="femmes">% Femmes</button>
                    <button class="segBtn" data-mode="para">% Para</button>
                    <button class="segBtn" data-mode="jeunes">% Jeunes</button>
                </div>

                <div class="filter-section-title">Filtres avancés</div>
                <div class="grid-2">
                    <select id="dept"><option value="">Département</option></select>
                    <select id="coachLevel"><option value="">Entraîneurs</option></select>
                </div>
                <div class="grid-2">
                    <select id="practice"><option value="">Pratiques</option></select>
                    <div class="toggle-wrap">
                        <input type="checkbox" id="clusterToggle"> <label for="clusterToggle">Grouper</label>
                    </div>
                </div>

                <div id="stats" class="stats-counter"></div>
                <div id="list" class="club-list"></div>
                
                <button id="reset" class="btn-reset">Réinitialiser tout</button>
            </div>
        </aside>

        <button id="panelBtn" class="mobile-toggle-bar">📊 Liste & Filtres</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    <script src="app.js"></script>
</body>
  <footer>
  © 2026 CY'ARC — Tous droits réservés
</footer>
</html>
