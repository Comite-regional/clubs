<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stats Clubs Tir à l'Arc - Pays de la Loire</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="main-container">
    <div id="map"></div>

    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>Statistiques Clubs</h1>
        <p>Pays de la Loire</p>
      </div>

      <div class="filters">
        <input type="text" id="search" placeholder="Rechercher un club, une ville...">
        
        <div class="filter-group">
          <select id="dept">
            <option value="">Tous départements</option>
          </select>
          <select id="practice">
            <option value="">Toutes pratiques</option>
          </select>
        </div>

        <div class="filter-group">
          <select id="coachLevel">
            <option value="">Tous les diplômes</option>
          </select>
        </div>

        <div class="checkbox-group">
          <label><input type="checkbox" id="onlyYouth"> Section Jeunes</label>
          <label><input type="checkbox" id="onlyRef"> Avec Arbitre</label>
        </div>

        <div class="mode-selector">
          <button class="segBtn active" data-mode="licences">Licenciés</button>
          <button class="segBtn" data-mode="femmes">% Femmes</button>
          <button class="segBtn" data-mode="para">% Para</button>
        </div>

        <div class="cluster-toggle">
          <label><input type="checkbox" id="clusterToggle"> Grouper les points</label>
        </div>

        <button id="reset" class="btn-reset">Réinitialiser les filtres</button>
      </div>

      <div id="stats" class="stats-container"></div>
      
      <div id="list" class="club-list">
        </div>
    </aside>

    <button id="panelBtn" class="mobile-toggle">📊 Liste & Filtres</button>
    <div id="overlay" class="overlay"></div>
  </div>

  <div id="legend" class="map-legend"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
  <script src="app.js"></script>
</body>
  <footer>
  © 2026 CY'ARC — Tous droits réservés
</footer>
</html>
