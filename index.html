<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cartographie Tir à l'Arc - Pays de la Loire</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="main-container">
        <div id="map"></div>

        <aside class="sidebar">
            <div class="sidebar-header">
                <img src="Unknown.png" alt="Logo Région" class="sidebar-logo">
                <div>
                    <h1>Tir à l'Arc</h1>
                    <p>Pays de la Loire</p>
                </div>
            </div>

            <div class="sidebar-content">
                <div class="segment-control">
                    <button class="segBtn active" data-mode="licences">Effectifs</button>
                    <button class="segBtn" data-mode="femmes">Femmes</button>
                    <button class="segBtn" data-mode="jeunes">Jeunes</button>
                    <button class="segBtn" data-mode="para">Para</button>
                </div>

                <div class="search-group">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="search" placeholder="Ville, club...">
                    </div>
                    <button id="btnSearch" title="Valider la recherche">
                        <i class="fas fa-arrow-right"></i>
                    </button>
                </div>

                <div class="filter-grid">
                    <select id="dept">
                        <option value="">Département</option>
                    </select>
                    <select id="coachLevel">
                        <option value="">Entraîneurs</option>
                    </select>
                </div>

                <div class="filter-grid">
                    <select id="practice">
                        <option value="">Discipline</option>
                        <option value="TAE">TAE (Extérieur)</option>
                        <option value="Salle">Tir en Salle</option>
                        <option value="Campagne">Campagne</option>
                        <option value="3D">Tir 3D</option>
                        <option value="Nature">Nature</option>
                    </select>
                    <div class="checkbox-simple">
                        <input type="checkbox" id="checkArbitre"> 
                        <label for="checkArbitre">Avec Arbitre</label>
                    </div>
                </div>

                <button class="btn-reset" onclick="location.reload()">Réinitialiser tout</button>

                <hr class="separator">

                <div id="stats" class="stats-counter"></div>
                
                <div class="filter-section-title">Top 10 clubs</div>
                <div id="list" class="club-list"></div>
            </div>

            <footer class="sidebar-footer">
                © 2026 CY'ARC — Tous droits réservés
            </footer>
        </aside>
    </div>

    <div id="overlay" class="overlay"></div>
    <button id="panelBtn" class="mobile-toggle-bar">📊 Liste & Filtres</button>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    <script src="app.js"></script>
</body>
</html>
