<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartographie Tir à l'Arc - Pays de la Loire</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="main-container">
        <div id="map"></div>

        <aside class="sidebar">
            <div class="sidebar-header">
                <img src="assets/Unknown.png" alt="Logo Région" class="sidebar-logo">
                <div>
                    <h1>Tir à l'Arc</h1>
                    <p>Pays de la Loire</p>
                </div>
            </div>

            <div class="filters-area">
                <div class="filter-section-title">Recherche (Nom, Ville, CP)</div>
                <div class="search-wrapper">
                    <input type="text" id="search" placeholder="Ex: Nantes, Guérande...">
                    <button id="searchValidate"><i class="fa-solid fa-magnifying-glass"></i></button>
                </div>

                <div class="filter-section-title">Mode d'analyse carte</div>
                <div class="mode-tabs">
                    <button class="segBtn active" data-mode="licences">Effectifs</button>
                    <button class="segBtn" data-mode="femmes">% Femmes</button>
                    <button class="segBtn" data-mode="para">% Para</button>
                    <button class="segBtn" data-mode="jeunes">% Jeunes</button>
                </div>

                <div class="filter-section-title">Filtres Avancés</div>
                <div class="grid-2">
                    <select id="dept">
                        <option value="">Département</option>
                    </select>
                    <select id="coachLevel">
                        <option value="">Entraîneurs</option>
                    </select>
                </div>
                
                <div class="grid-2">
                    <select id="practice">
                        <option value="">Toutes les pratiques</option>
                        <option value="Tir à l’arc exterieur">Tir à l’arc exterieur</option>
                        <option value="Tir à 18m">Tir à 18m</option>
                        <option value="Para">Para</option>
                        <option value="Beursault">Beursault</option>
                        <option value="3D">3D</option>
                        <option value="Campagne">Campagne</option>
                        <option value="Nature">Nature</option>
                        <option value="Loisirs">Loisirs</option>
                        <option value="Run archery">Run archery</option>
                    </select>
                    <div class="checkbox-simple">
                        <input type="checkbox" id="clusterToggle"> 
                        <label for="clusterToggle">Grouper</label>
                    </div>
                </div>

                <div class="checkbox-row">
                    <label><input type="checkbox" id="checkJeunes"> Section Jeunes</label>
                    <label><input type="checkbox" id="checkArbitre"> Avec Arbitre</label>
                </div>

                <button class="btn-reset" onclick="location.reload()">Réinitialiser tout</button>

                <hr class="separator">

                <div id="stats" class="stats-counter">Chargement...</div>
                
                <div class="filter-section-title">Top 10 clubs (Licenciés)</div>
                <div id="list" class="club-list"></div>
            </div>
        </aside>
    </div>

    <div id="overlay" class="overlay"></div>
    <button id="panelBtn" class="mobile-toggle-bar">📊 Liste & Filtres</button>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    <script src="app.js"></script>
</body>
  <footer>
  © 2026 CY'ARC — Tous droits réservés
</footer>
</html>
